name: Audio Gateway CI (Baremetal First)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: "0. Checkout Code"
      uses: actions/checkout@v4

    - name: "1. Install & Setup System Dependencies"
      run: |
        sudo apt-get update && sudo apt-get install -y libasound2-dev libgtest-dev libzmq3-dev cppzmq-dev libboost-all-dev pkg-config cmake g++ alsa-utils cppcheck clang-18 clang-tidy-18 llvm-18 libfuzzer-18-dev build-essential
        sudo ln -sf /usr/bin/clang-18 /usr/bin/clang && sudo ln -sf /usr/bin/clang++-18 /usr/bin/clang++ && sudo ln -sf /usr/bin/clang-tidy-18 /usr/bin/clang-tidy && sudo ln -sf /usr/bin/llvm-cov-18 /usr/bin/llvm-cov && sudo ln -sf /usr/bin/llvm-profdata-18 /usr/bin/llvm-profdata
        cd /usr/src/googletest && sudo cmake . && sudo cmake --build . && sudo cp lib/*.a /usr/lib

    - name: "2. Static Analysis (Cppcheck)"
      run: cppcheck --enable=all -I include --suppress=missingIncludeSystem src/ include/ --error-exitcode=1

    - name: "3. Linting (Clang-Tidy)"
      # I am enabling the flags here so clang-tidy understands the C++23 features in your headers.
      run: cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_CXX_COMPILER=clang++ -DENABLE_COVERAGE=ON -DENABLE_FUZZING=ON && find src include -name "*.cpp" -o -name "*.hpp" | xargs clang-tidy -p build --header-filter='.*'

    - name: "4. Compilation"
      # I am choosing to explicitly pass BOTH options to match your CMake logic.
      run: cmake -B build -DCMAKE_CXX_COMPILER=clang++ -DENABLE_COVERAGE=ON -DENABLE_FUZZING=ON && cmake --build build --parallel $(nproc)

    - name: "5. Unit Testing (GTest)"
      run: cd build && ctest --output-on-failure

    - name: "6. Coverage Analysis (LLVM-Cov)"
      run: cd build && llvm-profdata merge -sparse default.profraw -o test.profdata && llvm-cov report ./unit_tests -instr-profile=test.profdata ../src/alsa_impl.cpp

    - name: "7. Fuzzing Smoke Test"
      # This binary will now exist because -DENABLE_FUZZING=ON was passed in Step 4.
      run: ./build/fuzz_alsa -max_total_time=10 -rss_limit_mb=1024

    - name: "8. Container Build & Launch Test"
      run: docker build -t audio-gateway-prod . && docker run -d --name test-container audio-gateway-prod && sleep 2 && docker ps | grep test-container