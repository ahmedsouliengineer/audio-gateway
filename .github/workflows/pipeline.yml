name: Audio Gateway CI (Granular Ironclad)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Developer Environment
      # I am choosing to build the 'developer' stage as the runner engine.
      run: docker build --target developer -t gateway-env .

    - name: Step 1: Static Analysis (Cppcheck)
      run: |
        docker run --rm -v ${{ github.workspace }}:/app -w /app gateway-env \
        cppcheck --enable=all --suppress=missingIncludeSystem src/ include/ --error-exitcode=1

    - name: Step 2: Linting (Clang-Tidy)
      run: |
        docker run --rm -v ${{ github.workspace }}:/app -w /app gateway-env \
        bash -c "cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_CXX_COMPILER=clang++ && \
        run-clang-tidy -p build -header-filter='src/.*|include/.*'"

    - name: Step 3: Compilation
      run: |
        docker run --rm -v ${{ github.workspace }}:/app -w /app gateway-env \
        cmake --build build --parallel $(nproc)

    - name: Step 4: Unit Testing (GTest)
      # I am choosing to run only the tests here to verify logic first.
      run: |
        docker run --rm -v ${{ github.workspace }}:/app -w /app gateway-env \
        bash -c "cd build && ctest --output-on-failure"

    - name: Step 5: Coverage Analysis (LLVM-Cov)
      # I am choosing to generate the report only if the tests passed.
      run: |
        docker run --rm -v ${{ github.workspace }}:/app -w /app gateway-env \
        bash -c "cd build && \
        llvm-profdata merge -sparse default.profraw -o test.profdata && \
        llvm-cov report ./unit_tests -instr-profile=test.profdata ../src/"

    - name: Step 6: Fuzzing Smoke Test
      run: |
        docker run --rm -v ${{ github.workspace }}:/app -w /app gateway-env \
        ./build/fuzz_alsa -max_total_time=30 -rss_limit_mb=2048