name: Audio Gateway CI (Docker-Synced)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/devcontainers/cpp:1-ubuntu-24.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        apt-get update && apt-get install -y \
          libasound2-dev \
          libgtest-dev \
          libzmq3-dev \
          cppzmq-dev \
          libboost-all-dev \
          pkg-config \
          cmake \
          g++ \
          clang-18 \
          build-essential

    - name: Configure CMake
      # I am explicitly enabling the fuzzer in the main build to catch 
      # linking errors early.
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=clang++-18 -DENABLE_FUZZING=ON

    - name: Build Project
      run: cmake --build build --config Release

    - name: Run GTest Suite
      working-directory: build
      run: ctest --output-on-failure

    - name: Run Fuzzer (Short Smoke Test)
      # I am running a 30-second smoke test to ensure the fuzzer 
      # doesn't crash on startup due to missing Boost symbols.
      run: ./build/fuzz_alsa -max_total_time=30 -rss_limit_mb=2048