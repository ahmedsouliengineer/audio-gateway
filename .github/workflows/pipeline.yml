name: Audio Gateway CI (Baremetal Execution)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      # I am fixing the typo: 'uses/checkout' becomes 'actions/checkout'
      uses: actions/checkout@v4

    - name: Install Host Dependencies
      # I am choosing to add 'llvm' here so llvm-cov is available on the host.
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libgtest-dev cmake clang clang-tidy cppcheck llvm

    - name: Build Developer Environment (Tooling Only)
      run: docker build --target developer -t gateway-env .

    - name: Step 1: Static Analysis (Cppcheck)
      run: |
        docker run --rm -v ${{ github.workspace }}:/app -w /app gateway-env \
        cppcheck --enable=all --suppress=missingIncludeSystem src/ include/ --error-exitcode=1

    - name: Step 2: Linting (Clang-Tidy)
      run: |
        docker run --rm -v ${{ github.workspace }}:/app -w /app gateway-env \
        bash -c "cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_CXX_COMPILER=clang++ && run-clang-tidy -p build -header-filter='src/.*|include/.*'"

    - name: Step 3: Baremetal Compilation
      # I am fixing '$(proc)' to '$(nproc)' and ensuring strict YAML indentation.
      run: |
        cmake -B build -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_CXX_FLAGS="-fprofile-instr-generate -fcoverage-mapping"
        cmake --build build --parallel $(nproc)

    - name: Step 4: Unit Testing (Baremetal)
      run: |
        cd build
        ctest --output-on-failure

    - name: Step 5: Coverage Analysis (LLVM-Cov)
      run: |
        cd build
        llvm-profdata merge -sparse default.profraw -o test.profdata
        llvm-cov report ./unit_tests -instr-profile=test.profdata ../src/alsa_impl.cpp

    - name: Step 6: Fuzzing Smoke Test (Baremetal)
      run: ./build/fuzz_alsa -max_total_time=10 -rss_limit_mb=1024