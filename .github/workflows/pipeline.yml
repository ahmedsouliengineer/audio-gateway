name: Audio Gateway CI (Ironclad)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/devcontainers/cpp:1-ubuntu-24.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        apt-get update && apt-get install -y \
          libasound2-dev \
          libgtest-dev \
          libzmq3-dev \
          cppzmq-dev \
          libboost-all-dev \
          pkg-config \
          cmake \
          clang-18 \
          llvm-18 \
          clang-tidy-18 \
          build-essential

    - name: Configure (Generate Compilation Database)
      # I am enabling CMAKE_EXPORT_COMPILE_COMMANDS so clang-tidy can work.
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_COMPILER=clang++-18 \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DENABLE_COVERAGE=ON \
          -DENABLE_FUZZING=ON

    - name: Run Clang-Tidy (Static Analysis)
      # I am choosing to fail the build if any tidy warnings exist.
      # This enforces the "Clean Code" standards you requested.
      run: |
        run-clang-tidy-18 -p build -header-filter='src/.*|include/.*'

    - name: Build Project
      run: cmake --build build

    - name: Run GTest Suite & Generate Coverage
      working-directory: build
      run: |
        # I am running ctest and expecting 100% pass rate.
        ctest --output-on-failure
        
        # Merge profile data for coverage reporting.
        llvm-profdata-18 merge -sparse default.profraw -o test.profdata
        
        # I am outputting the coverage summary.
        llvm-cov-18 report ./unit_tests -instr-profile=test.profdata src/

    - name: Check Coverage Threshold
      # I am choosing to fail if coverage is below a certain % (optional but recommended).
      run: |
        COVERAGE=$(llvm-cov-18 report build/unit_tests -instr-profile=build/test.profdata src/ | grep 'TOTAL' | awk '{print $4}' | sed 's/%//')
        echo "Total Coverage: $COVERAGE%"
        # if [ $(echo "$COVERAGE < 80.0" | bc) -ne 0 ]; then echo "Coverage too low!"; exit 1; fi

    - name: Run Fuzzer (Smoke Test)
      # Short run to ensure no immediate memory leaks or crashes under stress.
      run: ./build/fuzz_alsa -max_total_time=30 -rss_limit_mb=2048