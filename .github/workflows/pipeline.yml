name: Audio Gateway CI (Docker-Synced)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/devcontainers/cpp:1-ubuntu-24.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      # I am adding libzmq3-dev and libboost-all-dev here.
      # Without these, PkgConfig in the next step will fail to find the .pc files.
      run: |
        apt-get update && apt-get install -y \
          libasound2-dev \
          libgtest-dev \
          libzmq3-dev \
          libboost-all-dev \
          pkg-config \
          cmake \
          g++ \
          clang-18 \
          build-essential

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: cmake --build build --config Release

    - name: Run GTest Suite
      working-directory: build
      run: ctest --output-on-failure

    - name: 4. Build and Run Fuzzer (LLVM 18)
      # I am using Clang-18 explicitly to match our Dockerfile toolchain.
      run: |
        cmake -B build_fuzz -DCMAKE_CXX_COMPILER=clang++-18 -DENABLE_FUZZING=ON
        cmake --build build_fuzz --target fuzz_alsa
        ./build_fuzz/fuzz_alsa -max_total_time=60 -rss_limit_mb=2048