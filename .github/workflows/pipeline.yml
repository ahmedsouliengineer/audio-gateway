name: Audio Gateway CI (Baremetal First)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: "0. Checkout Code"
      uses: actions/checkout@v4

    - name: "1. Install System Dependencies"
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev libgtest-dev cmake clang-18 llvm-18 clang-tidy-18 cppcheck build-essential

    - name: "2. Static Analysis (Cppcheck)"
      run: cppcheck --enable=all --suppress=missingIncludeSystem src/ include/ --error-exitcode=1

    - name: "3. Linting (Clang-Tidy)"
      run: cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_CXX_COMPILER=clang++-18 && find src include -name "*.cpp" -o -name "*.hpp" | xargs clang-tidy-18 -p build --header-filter='.*'

    - name: "4. Compilation"
      run: cmake -B build -DCMAKE_CXX_COMPILER=clang++-18 -DCMAKE_CXX_FLAGS="-fprofile-instr-generate -fcoverage-mapping" && cmake --build build --parallel $(nproc)

    - name: "5. Unit Testing (GTest)"
      run: cd build && ctest --output-on-failure

    - name: "6. Coverage Analysis (LLVM-Cov)"
      run: cd build && llvm-profdata-18 merge -sparse default.profraw -o test.profdata && llvm-cov-18 report ./unit_tests -instr-profile=test.profdata ../src/alsa_impl.cpp

    - name: "7. Fuzzing Smoke Test"
      run: ./build/fuzz_alsa -max_total_time=10 -rss_limit_mb=1024

    - name: "8. Container Build & Launch Test"
      run: docker build -t audio-gateway-prod . && docker run -d --name test-container audio-gateway-prod && sleep 2 && docker ps | grep test-container