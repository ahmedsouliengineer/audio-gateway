name: Audio Gateway CI (Docker-Synced)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/devcontainers/cpp:1-ubuntu-24.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        apt-get update && apt-get install -y \
          libasound2-dev \
          libgtest-dev \
          cmake \
          g++ \
          build-essential

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: cmake --build build --config Release

    - name: Run GTest Suite
      working-directory: build
      run: ctest --output-on-failure

    - name: 4. Build and Run Fuzzer (LLVM 18)
      # I am using a separate build directory 'build_fuzz' to ensure 
      # the Clang-sanitized binaries don't mix with our production GCC ones.
      # I am limiting the run to 60 seconds with a 2GB memory limit.
      # This is enough time to catch immediate 'Use-After-Free' or 'Buffer-Overflow' bugs.
      run: |
        cmake -B build_fuzz -DCMAKE_CXX_COMPILER=clang++-18 -DENABLE_FUZZING=ON
        cmake --build build_fuzz --target fuzz_alsa
        
        ./build_fuzz/fuzz_alsa -max_total_time=60 -rss_limit_mb=2048