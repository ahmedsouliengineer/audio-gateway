name: Audio Gateway CI (Docker-Synced)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/devcontainers/cpp:1-ubuntu-24.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      # I am adding lcov here to support the coverage report generation.
      run: |
        apt-get update && apt-get install -y \
          libasound2-dev \
          libgtest-dev \
          libzmq3-dev \
          cppzmq-dev \
          libboost-all-dev \
          pkg-config \
          cmake \
          g++ \
          clang-18 \
          build-essential \
          cppcheck \
          clang-format \
          lcov

    - name: Run Static Analysis (Cppcheck)
      # I am choosing to fail the build if high-severity issues are found.
      run: cppcheck --enable=warning,performance,portability --error-exitcode=1 src/ include/

    - name: Check Code Formatting
      # I am ensuring the code adheres to our .clang-format rules.
      run: find src include tests -name "*.cpp" -o -name "*.h" | xargs clang-format --dry-run --Werror

    - name: Configure and Build (Coverage Mode)
      # I am building in Debug mode with Coverage enabled to get accurate metrics.
      run: |
        cmake -B build_cov \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_COMPILER=clang++-18 \
          -DENABLE_COVERAGE=ON \
          -DENABLE_FUZZING=ON
        cmake --build build_cov

    - name: Run GTest Suite & Generate Coverage
      working-directory: build_cov
      run: |
        ctest --output-on-failure
        lcov --capture --directory . --output-file coverage.info
        lcov --remove coverage.info '/usr/*' '*/tests/*' '*/googletest/*' -o filtered.info

    - name: Upload Coverage Report
      # I am choosing to upload the filtered coverage data as a build artifact.
      uses: actions/upload-artifact@v4
      with:
        name: code-coverage
        path: build_cov/filtered.info

    - name: Run Fuzzer (Short Smoke Test)
      run: ./build_cov/fuzz_alsa -max_total_time=30 -rss_limit_mb=2048