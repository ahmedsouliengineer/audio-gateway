name: Audio Gateway CI (Docker-Synced)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/devcontainers/cpp:1-ubuntu-24.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        apt-get update && apt-get install -y \
          libasound2-dev \
          libgtest-dev \
          libzmq3-dev \
          cppzmq-dev \
          libboost-all-dev \
          pkg-config \
          cmake \
          clang-18 \
          llvm-18 \
          build-essential

    - name: Configure and Build (Instrumented)
      # I am enabling both Coverage and Fuzzing to run a comprehensive test suite.
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_COMPILER=clang++-18 \
          -DENABLE_COVERAGE=ON \
          -DENABLE_FUZZING=ON
        cmake --build build

    - name: Run GTest Suite & Generate Coverage
      working-directory: build
      run: |
        # I am running the tests to generate the raw profile data.
        ctest --output-on-failure
        
        # I am merging the raw profile into the indexed format Clang expects.
        llvm-profdata-18 merge -sparse default.profraw -o test.profdata
        
        # I am outputting a summary to the GitHub Actions log for immediate visibility.
        llvm-cov-18 report ./unit_tests -instr-profile=test.profdata src/

    - name: Run Fuzzer (Short Smoke Test)
      # I am running the fuzzer to ensure the instrumentation doesn't conflict.
      run: ./build/fuzz_alsa -max_total_time=30 -rss_limit_mb=2048